<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Main Grid Lines -->
  <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255, 0, 204, 0.4)" stroke-width="0.3"/>
  <path d="M 100 50 L 0 50 M 50 0 L 50 100" fill="none" stroke="rgba(255, 0, 122, 0.15)" stroke-width="0.2" stroke-dasharray="2,2"/>
  
  <!-- Glowing Dots at Main intersections -->
  <circle cx="0" cy="0" r="0.8" fill="rgba(255, 0, 204, 0.8)" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="0.5" fill="rgba(255, 0, 122, 0.4)"/>
</svg>
